on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      RENV_PATHS_ROOT: ~/.cache/R/renv   # ✅ clé pour éviter les reinstall

    steps:
      - uses: actions/checkout@v4

      # Quarto
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "release"

      # R
      - uses: r-lib/actions/setup-r@v2
        id: setup-r
        with:
          r-version: "release"

      # System deps
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            make \
            cmake \
            gdal-bin \
            libgdal-dev \
            libproj-dev \
            libudunits2-dev \
            libgeos-dev \
            libpng-dev \
            libfontconfig1-dev \
            libfreetype6-dev

      # CRAN mirror (rapide)
      - name: Set CRAN repo
        run: echo "options(repos = c(CRAN='https://packagemanager.posit.co/cran/latest'))" >> ~/.Rprofile

      # ✅ Cache renv (corrigé)
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/R/renv
          key: ${{ runner.os }}-renv-${{ hashFiles('**/renv.lock') }}
          restore-keys: ${{ runner.os }}-renv-

      # ✅ Restore renv (sans reinstall inutile)
      - name: Restore R packages with renv
        run: |
          Rscript -e 'install.packages("renv")'
          Rscript -e 'renv::restore(prompt = FALSE)'

      # Render
      - name: Render Quarto Project
        run: quarto render

      # Upload site
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
