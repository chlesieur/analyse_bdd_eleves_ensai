jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Quarto (stable)
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "release"

      # R
      - uses: r-lib/actions/setup-r@v2
        id: setup-r
        with:
          r-version: "release"

      # ✅ DOIT être indenté ici
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            make \
            cmake \
            gdal-bin \
            libgdal-dev \
            libproj-dev \
            libudunits2-dev \
            libgeos-dev \
            libpng-dev \
            libfontconfig1-dev \
            libfreetype6-dev

      - name: Set CRAN repo
        run: echo "options(repos = c(CRAN='https://packagemanager.posit.co/cran/latest'))" >> ~/.Rprofile

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-${{ hashFiles('**/renv.lock') }}
          restore-keys: ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-

      - name: Restore R packages with renv
        run: |
          Rscript -e 'install.packages("renv")'
          Rscript -e 'renv::restore(prompt = FALSE)'

      - name: Render Quarto Project
        run: quarto render

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
